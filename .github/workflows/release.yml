name: Release

# Tag push (v*) or manual. Does NOT npm publish — that stays human-gated.
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release-assets:
    name: Gates · assets · GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: npm ci

      - name: Gates
        run: |
          npm run privacy-audit
          npm run test -w 6ears-spotify-ads
          npm run test -w spotify-ads-agent
          npm run check-pack

      - name: Linux binary
        run: npm run build:binary

      - name: Collect assets
        run: |
          mkdir -p release-assets
          cp -f 6ears-spotify-ads-*.tgz release-assets/ 2>/dev/null || true
          cp -f dist/*.tar.gz dist/*.sha256 release-assets/ 2>/dev/null || true
          ls -la release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
