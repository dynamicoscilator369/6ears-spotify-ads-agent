name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Privacy · tests · pack
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      - name: Privacy audit
        run: npm run privacy-audit

      - name: CLI tests
        run: npm run test -w 6ears-spotify-ads

      - name: Agent tests
        run: npm run test -w spotify-ads-agent

      - name: Pack + tarball privacy
        run: npm run check-pack

      - name: Upload npm tarball
        uses: actions/upload-artifact@v4
        with:
          name: npm-pack
          path: 6ears-spotify-ads-*.tgz
          if-no-files-found: warn

  binary:
    name: Binary (${{ matrix.os }})
    needs: quality
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install
        run: npm ci

      - name: Build binary release
        run: npm run build:binary

      - name: Upload binary artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
          if-no-files-found: error
